# ==============================================================================
# alembic.ini
# ------------
# Alembic database migration configuration.
#
# Usage:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1
#
# Ref: docs/Database.md § 4 (Migration Strategy)
#      docs/DevelopmentRoadmap.md — Milestone 4
# ==============================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template used for migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Database URL — override this via environment variable DATABASE_URL
# or set directly here for local development.
# The env.py file reads DATABASE_URL from the environment first.
sqlalchemy.url = postgresql://ddos_user:change_this_password@localhost:5432/ddos_db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
