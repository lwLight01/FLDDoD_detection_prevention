[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    src/dashboard/node_modules,
    alembic/versions,
    notebooks

[isort]
profile = black
line_length = 100
known_first_party = shared,fl_server,fl_client,mitigation_engine,sdn_controller
