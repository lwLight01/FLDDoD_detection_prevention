name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # Python Lint & Unit Tests
  # ============================================================
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting & test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/mitigation_engine/requirements.txt
          pip install \
            black==24.2.0 \
            flake8==7.0.0 \
            isort==5.13.2 \
            pytest==8.0.2 \
            pytest-asyncio==0.23.5 \
            pytest-cov==4.1.0 \
            "pyyaml>=6.0.0"

      - name: Run unit tests
        continue-on-error: true
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          # Prevent pydantic-settings from trying to load .env in CI
          FL_NUM_ROUNDS: "100"
          FL_MIN_FIT_CLIENTS: "10"
          FL_MIN_AVAILABLE_CLIENTS: "15"
          FL_FRACTION_FIT: "0.5"
          FL_TRUST_PENALTY_THRESHOLD: "0.7"
          ALERT_PROBABILITY_THRESHOLD: "0.85"
          RISK_SCORE_WEIGHT_PROB: "0.6"
          RISK_SCORE_WEIGHT_FREQ: "0.3"
          RISK_SCORE_WEIGHT_DECAY: "0.1"
          RISK_STAGE1_THRESHOLD: "50.0"
          RISK_STAGE2_THRESHOLD: "70.0"
          RISK_STAGE3_THRESHOLD: "90.0"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # Docker Build Validation (Milestone 5)
  # ============================================================
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FL Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/fl_server.Dockerfile
          push: false
          tags: ddos-fl-server:ci

      - name: Build Mitigation Engine image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/mitigation_engine.Dockerfile
          push: false
          tags: ddos-mitigation-engine:ci

  # ============================================================
  # Integration Tests (Milestone 23+) — requires DB
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: ddos_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ddos_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio sqlalchemy asyncpg alembic pydantic-settings loguru

      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration
        env:
          DATABASE_URL: postgresql://ddos_user:test_password@localhost:5432/ddos_test_db
        continue-on-error: true   # Integration tests are skipped until Milestone 23
